<style>

<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-14 bg-surface dark:bg-on-background border-b border-divider-gray dark:border-on-secondary-fixed-variant transition-colors duration-200 ease-in-out">
<div class="flex items-center gap-md">
<button class="flex items-center justify-center w-10 h-10 hover:bg-surface-container-low dark:hover:bg-on-secondary-fixed-variant rounded-full transition-colors">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">收货地址</h1>
</div>
<button class="flex items-center justify-center w-10 h-10 hover:bg-surface-container-low dark:hover:bg-on-secondary-fixed-variant rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant dark:text-outline">search</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 px-margin-mobile max-w-2xl mx-auto">
<!-- Empty State (Hidden by default) -->
<div class="hidden flex flex-col items-center justify-center py-24 text-center" id="empty-state">
<div class="w-48 h-48 bg-surface-white rounded-full flex items-center justify-center mb-lg border border-divider-gray">
<span class="material-symbols-outlined text-outline" style="font-size: 64px;">location_on</span>
</div>
<p class="font-headline-sm text-headline-sm text-on-surface mb-sm">暂无收货地址</p>
<p class="font-body-md text-body-md text-text-gray">添加一个地址，开启您的优质瓷砖采购之旅</p>
</div>
<!-- Address List -->
<div class="space-y-md">
<!-- Address Card 1 (Default) -->
<div class="bg-surface-white rounded-xl p-md border border-divider-gray flex justify-between items-start transition-all hover:border-primary group">
<div class="flex-1">
<div class="flex items-center gap-sm mb-xs">
<span class="font-headline-sm text-headline-sm text-on-surface">张伟杰</span>
<span class="font-body-md text-body-md text-on-surface-variant">138 **** 8888</span>
<span class="px-xs py-[2px] bg-primary/10 text-primary font-label-sm text-label-sm rounded-sm">默认</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed mb-xs">广东省 佛山市 禅城区</p>
<p class="font-body-md text-body-md text-on-surface">季华五路28号 陶瓷产业园 创新大厦 8楼 802室</p>
</div>
<button class="p-sm text-text-gray hover:text-primary transition-colors">
<span class="material-symbols-outlined">edit</span>
</button>
</div>
<!-- Address Card 2 -->
<div class="bg-surface-white rounded-xl p-md border border-divider-gray flex justify-between items-start transition-all hover:border-primary group">
<div class="flex-1">
<div class="flex items-center gap-sm mb-xs">
<span class="font-headline-sm text-headline-sm text-on-surface">李明</span>
<span class="font-body-md text-body-md text-on-surface-variant">135 **** 9921</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed mb-xs">上海市 静安区</p>
<p class="font-body-md text-body-md text-on-surface">南京西路1601号 越洋广场 3205室</p>
</div>
<button class="p-sm text-text-gray hover:text-primary transition-colors">
<span class="material-symbols-outlined">edit</span>
</button>
</div>
<!-- Address Card 3 -->
<div class="bg-surface-white rounded-xl p-md border border-divider-gray flex justify-between items-start transition-all hover:border-primary group">
<div class="flex-1">
<div class="flex items-center gap-sm mb-xs">
<span class="font-headline-sm text-headline-sm text-on-surface">王志强 (工地负责人)</span>
<span class="font-body-md text-body-md text-on-surface-variant">186 **** 4455</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed mb-xs">北京市 朝阳区</p>
<p class="font-body-md text-body-md text-on-surface">建国路81号 华贸中心 写字楼2座</p>
</div>
<button class="p-sm text-text-gray hover:text-primary transition-colors">
<span class="material-symbols-outlined">edit</span>
</button>
</div>
<!-- Visual Decorative Element (Bento-style info card) -->
<div class="relative overflow-hidden bg-primary rounded-xl p-lg text-white mt-xl">
<div class="relative z-10">
<h3 class="font-headline-sm text-headline-sm mb-sm">专业配送保障</h3>
<p class="font-body-sm text-body-sm opacity-90 max-w-[240px]">我们为所有瓷砖订单提供专业的加固包装与物流跟踪，确保每一片瓷砖都能完好无损地送达您的工地。</p>
</div>
<!-- Abstract decorative shapes -->
<div class="absolute -right-12 -top-12 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
<div class="absolute right-8 bottom-4 flex gap-xs">
<div class="w-8 h-12 bg-white/20 rounded-sm transform -rotate-12 border border-white/30"></div>
<div class="w-8 h-12 bg-white/20 rounded-sm transform rotate-6 border border-white/30"></div>
</div>
</div>
</div>
</main>
<!-- Fixed Action Bar at bottom -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-white/80 backdrop-blur-md border-t border-divider-gray flex justify-center safe-bottom z-50">
<button class="w-full max-w-2xl bg-primary hover:bg-deep-blue text-on-primary h-12 rounded-full font-label-md text-label-md flex items-center justify-center gap-sm shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-size: 20px;">add</span>
            新增收货地址
        </button>
</div>
<!-- Script for simple interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.bg-surface-white');
            cards.forEach(card => {
                card.addEventListener('click', (e) => {
                    // Prevent click if edit button was clicked
                    if (e.target.closest('button')) return;
                    
                    // Ripple effect / selection visual logic
                    cards.forEach(c => c.classList.remove('ring-2', 'ring-primary'));
                    card.classList.add('ring-2', 'ring-primary');
                });
            });
        });
    </script>
</body></html>
