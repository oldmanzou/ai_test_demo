                提交订单
            </button>
</div>
</footer>
<!-- Simple Interaction Script -->
<script>
        document.getElementById('submitBtn').addEventListener('click', function() {
            this.disabled = true;
            this.innerHTML = '<span class="material-symbols-outlined animate-spin mr-sm" data-icon="progress_activity">progress_activity</span> 处理中...';
            
            setTimeout(() => {
                alert('订单提交成功！我们的销售经理将尽快与您联系协商物流细节。');
                this.disabled = false;
                this.innerHTML = '提交订单';
            }, 1500);
        });

        // Soft ripple-like effect on address card hover
        const addressCard = document.querySelector('section div.cursor-pointer');
        addressCard.addEventListener('mouseenter', () => {
            addressCard.style.boxShadow = '0 4px 12px rgba(0, 93, 170, 0.08)';
        });
        addressCard.addEventListener('mouseleave', () => {
            addressCard.style.boxShadow = 'none';
        });
    </script>
