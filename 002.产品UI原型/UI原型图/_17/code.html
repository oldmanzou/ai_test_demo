            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf9f8;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

<body class="bg-background text-on-surface antialiased pb-20">
<!-- TopAppBar -->
<header class="bg-surface-white dark:bg-inverse-surface w-full sticky top-0 z-50 border-b border-divider-gray dark:border-outline-variant transition-opacity active:opacity-70">
<div class="flex justify-between items-center px-margin-mobile py-sm w-full">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold tracking-tight text-primary dark:text-primary-fixed-dim">
            LUXE TILES
        </h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</div>
</header>
<main class="max-w-md mx-auto px-margin-mobile mt-lg space-y-xl">
<!-- Identity Verification Section -->
<section class="text-center space-y-sm">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary-container rounded-full mb-md">
<span class="material-symbols-outlined text-[40px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">
                verified_user
            </span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">账号安全</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
            绑定手机号可确保安全登录、订单通知，并为您的瓷砖项目提供准确配送。
        </p>
</section>
<!-- Current Phone Card -->
<div class="bg-surface-white border border-divider-gray rounded-xl p-lg space-y-md shadow-sm">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary">smartphone</span>
</div>
<div>
<span class="font-label-sm text-label-sm text-text-gray block">当前绑定</span>
<span class="font-price-display text-price-display text-on-surface tracking-widest">138****6789</span>
</div>
<div class="ml-auto">
<span class="inline-flex items-center px-sm py-xs rounded-full bg-[#E6F7FF] text-[#1890FF] font-label-sm text-label-sm">
                    已验证
                </span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-md">
<!-- WeChat Auth Button -->
<button class="w-full h-[56px] bg-success-green hover:bg-opacity-90 active:scale-[0.98] transition-all rounded-xl flex items-center justify-center gap-md text-white shadow-md" onclick="handleWeChatAuth()">
<svg fill="currentColor" height="24" viewbox="0 0 24 24" width="24">
<path d="M8.522 7.003c.121 0 .245.006.37.017-.116-.39-.18-.804-.18-1.233 0-2.31 2.146-4.183 4.792-4.183 2.647 0 4.793 1.872 4.793 4.183s-2.146 4.183-4.793 4.183a5.5 5.5 0 01-.893-.075c-1.393 1.012-3.045 1.554-4.509 1.705.46-.864.71-1.782.71-2.651 0-.325-.035-.642-.1-.946zm11.516 6.136c0 1.956-2.071 3.542-4.625 3.542-.258 0-.51-.016-.755-.047-.384.303-.836.564-1.334.772.316-.677.487-1.396.487-2.075 0-.254-.025-.502-.074-.741.077-.003.155-.008.234-.008 2.554 0 4.667-1.442 4.667-3.22 0-1.778-2.113-3.22-4.667-3.22s-4.667 1.442-4.667 3.22c0 .408.111.796.311 1.15-.098.332-.152.684-.152 1.05 0 2.305 2.14 4.173 4.78 4.173.266 0 .526-.019.778-.054 1.402 1.018 3.065 1.564 4.54 1.716-.463-.87-.715-1.795-.715-2.67 0-.21.016-.416.046-.615.89-.544 1.446-1.42 1.446-2.393zm-9.358-8.24c.4 0 .723.324.723.723s-.323.723-.723.723a.723.723 0 010-1.446zm4.183 0c.4 0 .723.324.723.723s-.323.723-.723.723-.723-.324-.723-.723.324-.723.723-.723z"></path>
</svg>
<span class="font-label-md text-label-md">微信一键授权</span>
</button>
<!-- Manual Entry Secondary Button -->
<button class="w-full h-[56px] border border-primary text-primary hover:bg-surface-container-low active:scale-[0.98] transition-all rounded-xl font-label-md text-label-md flex items-center justify-center" onclick="toggleManualEntry()">
            手动输入修改
        </button>
</div>
<!-- Manual Entry Form (Hidden by default) -->
<div class="hidden space-y-md animate-in fade-in slide-in-from-top duration-300" id="manual-form">
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-sm">新手机号</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-text-gray font-label-md">+86</span>
<input class="w-full h-[52px] pl-[56px] pr-md rounded-lg border border-divider-gray focus:border-primary focus:ring-1 focus:ring-primary-container outline-none bg-surface-white font-body-md text-body-md" placeholder="请输入11位手机号" type="tel"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-sm">验证码</label>
<div class="flex gap-sm">
<input class="flex-1 h-[52px] px-md rounded-lg border border-divider-gray focus:border-primary outline-none bg-surface-white font-body-md text-body-md" placeholder="6位验证码" type="number"/>
<button class="px-md h-[52px] rounded-lg border border-divider-gray text-primary font-label-md hover:bg-surface-container transition-colors whitespace-nowrap">
                    发送验证码
                </button>
</div>
</div>
<button class="w-full h-[52px] bg-primary text-white rounded-xl font-label-md text-label-md mt-md shadow-sm active:opacity-80">
            确认修改
        </button>
</div>
<!-- Security Visual (Bento-lite) -->
<div class="grid grid-cols-2 gap-sm pt-xl pb-lg">
<div class="bg-surface-container-low p-md rounded-xl flex flex-col items-center text-center gap-xs">
<span class="material-symbols-outlined text-outline">encrypted</span>
<span class="font-label-sm text-label-sm text-on-surface">端到端加密</span>
</div>
<div class="bg-surface-container-low p-md rounded-xl flex flex-col items-center text-center gap-xs">
<span class="material-symbols-outlined text-outline">verified</span>
<span class="font-label-sm text-label-sm text-on-surface">身份已验证</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-surface-white dark:bg-inverse-surface border-t border-divider-gray dark:border-outline-variant shadow-sm flex justify-around items-center h-16">
<a class="flex flex-col items-center justify-center text-text-gray dark:text-outline active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">首页</span>
</a>
<a class="flex flex-col items-center justify-center text-text-gray dark:text-outline active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-label-sm text-label-sm">分类</span>
</a>
<a class="flex flex-col items-center justify-center text-text-gray dark:text-outline active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-label-sm text-label-sm">购物车</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-medium active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">我的</span>
</a>
</nav>
<script>
    function handleWeChatAuth() {
        const btn = event.currentTarget;
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
        setTimeout(() => {
            alert('微信授权请求已发送，请在微信客户端查看。');
            btn.innerHTML = originalContent;
        }, 1500);
    }

    function toggleManualEntry() {
        const form = document.getElementById('manual-form');
        form.classList.toggle('hidden');
        if(!form.classList.contains('hidden')) {
            form.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
    }
</script>
</body></html>
