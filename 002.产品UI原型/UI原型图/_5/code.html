<script>
        // Simple Interaction for Filter Selection
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if(this.classList.contains('px-md') && this.classList.contains('rounded-full')) {
                    // Toggle basic filter state visualization
                    const icon = this.querySelector('.material-symbols-outlined:last-child');
                    if (icon && icon.innerText === 'expand_more') {
                        // Just a UI feedback for interaction
                        this.classList.toggle('border-primary');
                        this.classList.toggle('text-primary');
                    }
                }
            });
        });

        // Search Bar Focus Effect
        const searchInput = document.querySelector('input');
        const searchContainer = searchInput.parentElement;
        
        searchInput.addEventListener('focus', () => {
            searchContainer.classList.add('border-primary', 'shadow-md');
        });
        
        searchInput.addEventListener('blur', () => {
            searchContainer.classList.remove('border-primary', 'shadow-md');
        });
    </script>
