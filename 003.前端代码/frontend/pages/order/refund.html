<body class="font-body-md text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-14 bg-surface border-b border-divider-gray">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container-low transition-colors duration-200" onclick="location.href='../order/detail.html'">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">申请退款</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">help_outline</span>
</div>
</header>
<main class="pt-20 px-margin-mobile max-w-2xl mx-auto space-y-md">
<!-- Order Summary Card -->
<section class="bg-surface-white border border-divider-gray rounded-lg p-md flex gap-md">
<img class="w-20 h-20 object-cover rounded-md border border-divider-gray" data-alt="A macro shot of premium large-format porcelain floor tiles featuring a subtle grey marble vein texture. The tiles are arranged in a clean, minimalist architectural setting with soft natural sunlight casting gentle shadows. The aesthetic is professional, high-end, and emphasizes structural precision and clean lines in a modern gallery-like environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYPJFyUJv5umYebWPX2TQdVa1wkFUG_d32yj1Bz4fOUMANo1iZTUesx8Js4Ab4kxKDqczt6oZskFeCPW26feuXXbUnpvLqS1h__9LkahrnZhD0WIex6Nj5CshJgbc47eYsW4WZmGp8xEx3NspExVz600yxqyYOpvcMDigqUCLr-b8n_kjO_9x0dkqQVleF5T5Psl7LDaoxNQxHFFXuUxkNC1AmzE4vLFr9ZpO9FnFXAQB_dLzJ1BWXWOtGARNoELXh_Wml-ioJsg"/>
<div class="flex-1">
<h2 class="font-label-md text-label-md text-on-surface line-clamp-1">云山石迹系列 - 大理石纹通体大板 800x800mm</h2>
<p class="font-body-sm text-body-sm text-text-gray mt-1">规格：浅灰 · 哑光防滑 | 数量：x48</p>
<p class="font-price-display text-price-display text-primary mt-2">¥4,280.00</p>
</div>
</section>
<!-- Refund Form -->
<div class="space-y-md">
<!-- Refund Reason -->
<div class="bg-surface-white border border-divider-gray rounded-lg p-md">
<label class="block font-label-md text-label-md text-on-surface mb-sm">退款原因 <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full h-11 px-md appearance-none bg-surface-container-lowest border border-divider-gray rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed font-body-md text-body-md">
<option value="">请选择退款原因</option>
<option value="1">拍错/多拍/不想要了</option>
<option value="2">协商一致退款</option>
<option value="3">质量问题 - 破损/色差</option>
<option value="4">未按约定时间发货</option>
<option value="5">其他</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-text-gray pointer-events-none">expand_more</span>
</div>
</div>
<!-- Refund Explanation -->
<div class="bg-surface-white border border-divider-gray rounded-lg p-md">
<label class="block font-label-md text-label-md text-on-surface mb-sm">退款说明</label>
<textarea class="w-full p-md bg-surface-container-lowest border border-divider-gray rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary-fixed font-body-md text-body-md resize-none" placeholder="请详细描述您遇到的问题，以便我们更准确地处理（选填）" rows="4"></textarea>
</div>
<!-- Evidence Upload -->
<div class="bg-surface-white border border-divider-gray rounded-lg p-md">
<div class="flex justify-between items-center mb-sm">
<label class="font-label-md text-label-md text-on-surface">上传凭证</label>
<span class="text-body-sm font-body-sm text-text-gray">最多3张</span>
</div>
<div class="flex gap-md flex-wrap">
<div class="w-20 h-20 bg-surface-container-low border border-dashed border-outline-variant rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-outline">add_a_photo</span>
<span class="text-[10px] text-text-gray mt-1">添加图片</span>
</div>
</div>
<p class="mt-sm text-body-sm font-body-sm text-text-gray">建议上传包含包裹面单、破损细节的照片</p>
</div>
<!-- Amount Breakdown -->
<div class="bg-surface-white border border-divider-gray rounded-lg p-md">
<h3 class="font-label-md text-label-md text-on-surface mb-md">退款金额明细</h3>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<span class="text-body-md font-body-md text-text-gray">商品总额</span>
<span class="text-body-md font-body-md text-on-surface">¥4,280.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-body-md font-body-md text-text-gray">运费退还</span>
<span class="text-body-md font-body-md text-on-surface">¥120.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-body-md font-body-md text-text-gray">满减优惠</span>
<span class="text-body-md font-body-md text-error">-¥200.00</span>
</div>
<div class="pt-sm border-t border-divider-gray flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface">预计退款总额</span>
<span class="font-headline-sm text-headline-sm text-primary">¥4,200.00</span>
</div>
</div>
<div class="mt-md p-sm bg-surface-container-low rounded text-body-sm font-body-sm text-on-surface-variant flex gap-sm">
<span class="material-symbols-outlined text-sm leading-none" style="font-size: 16px;">info</span>
<span>退款将原路返回至您的支付账号，预计1-3个工作日内到账。</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-surface-white border-t border-divider-gray pb-safe">
<div class="px-margin-mobile py-md flex items-center justify-center max-w-2xl mx-auto">
<button class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-full shadow-lg hover:bg-deep-blue transition-all active:scale-95 flex items-center justify-center gap-2" onclick="handleSubmit()">
                提交申请
            </button>
</div>
</footer>
<!-- Toast Notification (Hidden by default) -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] px-lg py-sm bg-inverse-surface text-on-primary rounded-full shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none flex items-center gap-2" id="toast">
<span class="material-symbols-outlined text-success-green">check_circle</span>
<span class="text-body-md font-body-md">申请已提交，正在审核中</span>
</div>
<script src="../../assets/js/common.js"></script>
<script>
        function handleSubmit() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');

            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
                window.location.href = '../order/detail.html';
            }, 3000);
        }

        // Mock image upload interaction
        document.querySelector('.border-dashed').addEventListener('click', function() {
            const container = this.parentElement;
            if (container.children.length > 3) return;

            const newImg = document.createElement('div');
            newImg.className = 'w-20 h-20 rounded-lg overflow-hidden border border-divider-gray relative group';
            newImg.innerHTML = `
                <img src="https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" 
                     class="w-full h-full object-cover" 
                     data-alt="A clean, close-up photograph of a porcelain tile surface showing minor hairline cracks on the edge, used as insurance evidence for a refund claim. The lighting is bright and clear, emphasizing the defect against a neutral white background. The photo is taken in a professional manner with high resolution and minimal color distortion to ensure accuracy.">
                <button class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity" onclick="this.parentElement.remove()">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            `;
            container.insertBefore(newImg, this);
        });
    </script>
</body></html>
