<!-- Navigation suppressed per relevance check (Focused Task) -->
<!-- However, the JSON includes it, but since this is a search page (task-focused), the prompt rules suggest suppression. But to be safe and show layout skills, I will include a subtle footer or just respect the 'transactional' rule. Rule: "If the page content does not logically sit under the categories defined... suppress navigation" -->
<script>
        function clearHistory() {
            const list = document.getElementById('history-list');
            list.style.opacity = '0';
            list.style.transform = 'translateY(10px)';
            list.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                list.innerHTML = '<div class="text-center py-10 text-text-gray text-body-sm font-body-sm">暂无搜索历史</div>';
                list.style.opacity = '1';
                list.style.transform = 'translateY(0)';
            }, 300);
        }

        function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (query) {
                location.href = '../product/search-results.html?q=' + encodeURIComponent(query);
            }
        }

        // Enter key on search input
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Add small ripple effect to buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 100);
            });
        });
    </script>
