<script>
        // Simple Carousel Logic
        const carousel = document.getElementById('carousel');
        const counter = document.getElementById('carousel-current');
        let currentIdx = 0;
        const totalItems = 2;

        setInterval(() => {
            currentIdx = (currentIdx + 1) % totalItems;
            carousel.style.transform = `translateX(-${currentIdx * 100}%)`;
            counter.textContent = currentIdx + 1;
        }, 4000);

        // Interaction for Favorite Button
        const favBtn = document.getElementById('favorite-btn');
        favBtn.addEventListener('click', () => {
            const icon = favBtn.querySelector('.material-symbols-outlined');
            const isFilled = icon.getAttribute('style')?.includes('FILL');
            if (isFilled) {
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.remove('text-tertiary');
                icon.classList.add('text-primary');
            } else {
                icon.style.fontVariationSettings = "'FILL' 1";
                icon.classList.remove('text-primary');
                icon.classList.add('text-tertiary');
            }
        });

        // Add subtle elevation on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-sm');
            } else {
                header.classList.remove('shadow-sm');
            }
        });
    </script>
